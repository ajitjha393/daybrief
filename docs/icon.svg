<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- daybrief mark: daybreak on a card. The brand diamond is a dawn sky;
       the sun clears the horizon — your day, briefed before it starts. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a94ea"/>
      <stop offset="0.55" stop-color="#2a78d6"/>
      <stop offset="1" stop-color="#174f97"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#fab219"/>
    </linearGradient>
    <clipPath id="card">
      <rect x="11" y="11" width="42" height="42" rx="9" transform="rotate(45 32 32)"/>
    </clipPath>
  </defs>
  <rect x="11" y="11" width="42" height="42" rx="9" transform="rotate(45 32 32)" fill="url(#sky)"/>
  <g clip-path="url(#card)">
    <!-- sun, half-risen -->
    <circle cx="32" cy="37.5" r="8.5" fill="url(#glow)"/>
    <!-- rays -->
    <g stroke="#ffd166" stroke-width="2.4" stroke-linecap="round" opacity="0.9">
      <line x1="32" y1="22.5" x2="32" y2="26.5"/>
      <line x1="20.5" y1="27" x2="23.6" y2="29.6"/>
      <line x1="43.5" y1="27" x2="40.4" y2="29.6"/>
    </g>
    <!-- the day, below the horizon: three brief lines on the page -->
    <rect x="0" y="37.5" width="64" height="30" fill="#fcfcfb"/>
    <g fill="#2a78d6" opacity="0.85">
      <rect x="23" y="41.5" width="18" height="2.6" rx="1.3"/>
      <rect x="26" y="46.3" width="12" height="2.6" rx="1.3" opacity="0.66"/>
      <rect x="29" y="51.1" width="6" height="2.6" rx="1.3" opacity="0.4"/>
    </g>
  </g>
</svg>
